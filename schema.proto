}

message GeneratorAngle { // when pulses are received
    int64 time = 1;
    float angle = 2; // in degrees
} 

message RotorGenAngle {
    int64 time = 1;
    float rotor_angle = 2; // in degrees
    float gen_angle = 3; // in degrees
}

// A sub-message to hold data for a single phase
message PhaseMeasurement {
  float voltage = 1;
  float current = 2;
}

message InverterGrid {
    int64 time = 1;
    PhaseMeasurement phase1 = 2;
    PhaseMeasurement phase2 = 3;
    PhaseMeasurement phase3 = 4;
    float frequency = 5;
}

message InverterFault {
    int64 time = 1;
    uint32 warningCode = 2;
    uint64 faultCode = 3;
}

// ================= Task counters =================

// Task identifiers for on-device schedulable loops or threads.
// Keep numbering dense starting from 0 to minimize enum varint size.
enum TaskId {
    SUPERVISOR = 0;
    CONTROL_INPUT = 1;
    BLADE_CONTROL = 2;
    UPLOAD = 3;
    MONITOR = 4;
    TURBINE_CONTROL = 5; // unified WC/Aero
    IMU = 6;
    COMPASS = 7;
    TEMP = 8;
    HIL_SERIAL_INPUT = 9;
    WIND_STATS = 10;
    WEB_CONTROL = 11;
}

// Cumulative counts per task. All counters are monotonically increasing and may wrap on overflow.
message TaskCounterSample {
    TaskId id = 1; // compact enum ID
    uint32 loop_count = 2; // number of successful loop iterations executed
    uint32 overrun_count = 3; // number of detected scheduling overruns
}

// Batch of all counters at one time point.
message TaskCounters {
    int64 time = 1; // from newLocalTime() / millis since epoch
    repeated TaskCounterSample samples = 2 [(nanopb).max_count = 12]; // one per active task
}

// Metmast Telemetry Packet
message MetmastTelemetry {
    int64 time = 1; // microseconds since epoch
    // Wind: Packed Integers (Efficient for arrays). 35 samples per second.
    repeated uint32 cup1_raw_counts = 2 [packed=true, (nanopb).max_count = 35, (nanopb).int_size = IS_16]; // North sensor
    repeated uint32 cup2_raw_counts = 3 [packed=true, (nanopb).max_count = 35, (nanopb).int_size = IS_16]; // South sensor

    // Met: Floats (Preserves averaging precision)
    float temp_avg_volts = 4;
    float pres_avg_volts = 5;
    float dir_avg_ratio = 6;
    // Direction at 5Hz: 5 circular-averaged ratios (each from 7 raw samples). Ratio 0-1 maps to 0-360 deg.
    repeated float dir_ratios = 7 [(nanopb).max_count = 5];
}

// Detailed operational data regarding RPM setpoints and limiting factors
message RPMSetpoints {
    int64 time = 1; // Timestamp
    float input_sp = 2; // User input setpoint (from TurbineControlLight)
    float wind_limited_sp = 3; // After wind speed limiting
    float temp_limited_sp = 4; // After temperature limiting (reduction applied)
    float current_limited_sp = 5; // After current/export limiting
    float soft_target_sp = 6; // Soft approach target (prevents overshoot)
    float ramped_sp = 7; // Final ramped setpoint sent to pitch control
    float actual_rpm = 8; // Measured rotor RPM
    float wind_speed = 9; // Estimated wind speed (m/s)
    float temp_reduction = 10; // RPM reduction due to temperature (>=0)
    float filtered_temp = 11; // Filtered winding temperature
    float filtered_current = 12; // Filtered generator current
    bool is_export_reduced = 13; // True if in low-current reduced export state
    bool is_temp_control_active = 14; // True if temperature PID is active
}

// Raw IMU blade-tip packet: 2 acc axes + 1 gyro axis, 40 samples at 50Hz (0.8s window).
// Raw 16-bit signed integers. Convert to physical units: value = raw * range / 32768.0
message ImuBladeTip {
    int64 time = 1; // microseconds since epoch (start of window)
    repeated sint32 acc_x = 2 [packed=true, (nanopb).max_count = 40, (nanopb).int_size = IS_16];
    repeated sint32 acc_y = 3 [packed=true, (nanopb).max_count = 40, (nanopb).int_size = IS_16];
    repeated sint32 gyro_z = 4 [packed=true, (nanopb).max_count = 40, (nanopb).int_size = IS_16];
    uint32 acc_range = 5 [(nanopb).int_size = IS_8];    // full-scale range in G (e.g. 16 for +-16G)
    uint32 gyro_range = 6;                              // full-scale range in dps (e.g. 256, 512, 2048)
}

// Batched delta-encoded raw ADC readings from load cells (right-shifted to discard noisy LSBs).
// ch[0] is absolute; ch[1..N-1] are deltas from the previous sample.
// Server reconstructs absolute values by cumulative sum, then << right_shift (from ForceCalibration).
message ForceRaw {
    int64 time = 1; // microseconds since epoch (start of batch window)
    repeated sint32 ch0 = 2 [packed=true, (nanopb).max_count = 80];
    repeated sint32 ch1 = 3 [packed=true, (nanopb).max_count = 80];
    repeated sint32 ch2 = 4 [packed=true, (nanopb).max_count = 60];
    repeated sint32 ch3 = 5 [packed=true, (nanopb).max_count = 40];
}

// Breakdown of the contributors feeding PitchControlManager::pitchSPOperation()
// in ESP32Turbine. Published at ~10 Hz to visualize how the TSR Cp-max
// scheduler, PI RPM controller, cold-generator stall-margin floor, startup
// ramps and anti-stall floors arbitrate into the final pitch SP.
message PitchSPBreakdown {
    int64 time = 1;
    float pitchSP = 2;            // final SP sent to stepper
    float tsrScheduledSP = 3;     // Cp-max TSR scheduler output (0 when ineligible)
    float rpmControlSP = 4;       // PI RPM controller output (upper-clamped)
    float tempPitchFloor = 5;     // coldPitchFloor() contribution (stall-margin min pitch)
    float pitchInSP = 6;          // soft startup pitch-in ramp contribution
    float optimalStart = 7;       // startup seek curve contribution
    float minPitchManual = 8;     // slew-limited manual min-pitch
    float minHighAcc = 9;         // anti-stall (MIN_PITCH_ANTI_STALL) floor
    float tsr = 10;               // TSR estimate from WindEstimator used by scheduler
    float windingTempC = 11;      // winding temp driving tempPitchFloor
    bool tsrSchedulerSelected = 12; // sub-selector: scheduler vs PI
    bool rpmControllerSelected = 13; // outer selector: PI vs otherLimits floor pool
    // K-observer (KObserver.h) — classifies active Deye curve {K16,K20,K26,K34}
    // from (omegaRotor, generatorTorque) at 200 Hz. kFloor is the resulting
    // min-pitch contribution (0/5/10/15 deg) in the otherLimits max() pool.
    int32 kClass = 14;              // 16 / 20 / 26 / 34
    float kHatLast = 15;            // instant K_hat per sample [Nm/(rad/s)^2]
    float kHatUp = 16;              // 100 ms causal LP (UP-trigger driver)
    float kHatDn = 17;              // 500 ms causal LP (DOWN-trigger driver)
    float kFloor = 18;              // min-pitch floor from kClass [deg]
}

// Periodic calibration snapshot for load cells. Sent every N seconds (EEPROM-configurable).
// Server matches to ForceRaw via Wrapper target field.
// To convert raw to Newtons: force_N = ((stored_value << right_shift) - offset) / scale
message ForceCalibration {
    int64 time = 1;
    repeated int32 offsets = 2 [packed=true, (nanopb).max_count = 4];
    repeated float scales = 3 [packed=true, (nanopb).max_count = 4];
    repeated uint32 gains = 4 [packed=true, (nanopb).max_count = 4, (nanopb).int_size = IS_8];
    uint32 frequency = 5;                               // sampling frequency in Hz (10, 20, 80, 320)
    uint32 num_channels = 6 [(nanopb).int_size = IS_8];
    uint32 right_shift = 7 [(nanopb).int_size = IS_8];  // bits shifted off raw ADC values
}

// =========================================================
// High-frequency telemetry series (packed quantized samples)
// =========================================================
// Each *Series message bundles N correlated samples emitted by a
// producer task. Sample timestamps reconstructed as:
//   sample_time_us[i] = time + i * sample_period_us
// Sample rate = (producer task rate) / divider, where divider is set
// at runtime via HTTP /messageFrequency endpoints on the ESP32.
//
// Encoding conventions per channel:
//   "delta": ch[0] absolute; ch[1..N-1] deltas from previous sample.
//   "abs":   every sample is an independent absolute value.
//
// Scales are fixed (hardcoded) for the TWT-11 Aero turbine design.
// If scales ever need to change, introduce a V2 message type rather
// than adding per-message scale fields. Precedent: Vesc -> Vesc2.

// Rotor velocity + motor current, from TurbineControlTaskAero.
// gen_vel:       delta, scale = 20 rad/s / 32768 ~= 6.1e-4 rad/s/unit, range +-20 rad/s (+-191 RPM).
// motor_current: abs,   scale = 1 mA/unit, range +-32.767 A.
message RotorVelSeries {
    int64 time = 1;                                                                          // first-sample us epoch
    uint32 sample_period_us = 2;
    repeated sint32 gen_vel = 3       [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 motor_current = 4 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    // gyro_y bleed-through correction applied to omega before the pitch loop:
    //   omega_for_pitch = gen_vel - gyro_y_correction
    // Absolute int16, quantized at 20 rad/s / 32768 (matches gen_vel scale).
    // All-zero when gyroYBeta == 0 (feature disabled).
    repeated sint32 gyro_y_correction = 5 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
}

// Pitch controller state, from BladeControlTask (sampled on pitch command arrival).
// All channels: delta, scale = 100 deg / 32768 ~= 0.003 deg/unit, range +-100 deg.
// pitch_estimate is the beta-gain-schedule angle (not a sensor estimate).
// pitch_i is the PI integrator value expressed in pitch-degree-equivalent units.
message BladeControlSeries {
    int64 time = 1;
    uint32 sample_period_us = 2;
    repeated sint32 pitch_sp = 3       [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 pitch_estimate = 4 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 pitch_i = 5        [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
}

// Pitch actuator feedback, from BladeControlTask (sampled on stepper serial packet).
// current1, current2: delta, raw driver setpoint units, range +-255.
//                     *** Gain-dependent: values at stepper-board gain=20 are ~2x values at gain=10. ***
//                     Future: replace with belt-force once mechanical model validated.
// collective: delta, scale = 100 deg / 32768 ~= 0.003 deg/unit, range +-100 deg. Matches pitch_sp.
// cyclic:     delta, scale = 10 deg / 32768 ~= 3.05e-4 deg/unit, range +-10 deg.
message StepperFeedbackSeries {
    int64 time = 1;
    uint32 sample_period_us = 2;
    repeated sint32 current1 = 3   [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 current2 = 4   [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 collective = 5 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 cyclic = 6     [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
}

// Raw QMI8658C IMU samples, from imuQMI8658CTask.
// acc_{x,y,z}:  abs, raw int16 from sensor. Convert: G     = raw / 4096   (range +-8G,   4096 LSB/G).
// gyro_{x,y,z}: abs, raw int16 from sensor. Convert: deg/s = raw / 128    (range +-256,  128  LSB/(deg/s)).
// 15 samples (not 20) to fit 320-byte Wrapper budget at worst-case full-scale vibration.
message Imu6Series {
    int64 time = 1;
    uint32 sample_period_us = 2;
    repeated sint32 acc_x = 3  [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
    repeated sint32 acc_y = 4  [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
    repeated sint32 acc_z = 5  [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
    repeated sint32 gyro_x = 6 [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
    repeated sint32 gyro_y = 7 [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
    repeated sint32 gyro_z = 8 [packed=true, (nanopb).max_count = 15, (nanopb).int_size = IS_16];
}

// Filter-output Euler angles, from imuQMI8658CTask.
// All channels: delta, scale = 180 deg / 32768 ~= 0.0055 deg/unit, range +-180 deg.
// yaw is continuously unwrapped on the ESP (not rewrapped to [0,360)); server rewraps for display.
message EulerSeries {
    int64 time = 1;
    uint32 sample_period_us = 2;
    repeated sint32 roll = 3  [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 pitch = 4 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated sint32 yaw = 5   [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
}

// Rotor + generator angles, from TurbineControlTaskAero.
// Both channels: abs, 0-360 deg mapped to 0-16383 (14-bit), scale = 360 / 16384 ~= 0.022 deg/unit.
// 14-bit guarantees 2-byte varint per sample. No delta encoding (wrap breaks deltas).
message RotorGenAngleSeries {
    int64 time = 1;
    uint32 sample_period_us = 2;
    repeated uint32 rotor_angle = 3 [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
    repeated uint32 gen_angle = 4   [packed=true, (nanopb).max_count = 20, (nanopb).int_size = IS_16];
}

// Slow-varying stepper status (bitflags + driver temperature). Emitted at 1 Hz from BladeControlTask.
// Replaces the status/temp fields that used to live in single-shot StepperFeedback on Aero.
message StepperStatus {
    int64 time = 1;
    uint32 status = 2 [(nanopb).int_size = IS_8];
    float temp = 3;
}

// Pitch failsafe verification test event — emitted once per test end by
// ESP32Turbine BladeControlTask / PitchTestController. One Influx point per test.
message PitchTestEvent {
    int64  time                    = 1;  // event-end time, microseconds since epoch
    uint32 outcome                 = 2 [(nanopb).int_size = IS_8];  // 0=Success, 1=AbortPitch, 2=AbortRPM, 3=Timeout, 4=Interrupted
    uint32 duration_ms             = 3 [(nanopb).int_size = IS_16];
    float  pitch_start_deg         = 4;
    float  pitch_end_deg           = 5;
    float  rpm_start               = 6;
    float  rpm_end                 = 7;
    float  wind_start              = 8;   // m/s
    float  wind_end                = 9;   // m/s
    float  generator_torque_start  = 10;  // Nm
    float  generator_torque_end    = 11;  // Nm
    float  abort_value             = 12;  // deg pitchDrop or RPM rpmRise; 0 for non-abort
}
// Davis-style wind sensor series (period-based anemometer + analog vane).
// 10 bins x 200 ms = 2 s window, sent at 0.5 Hz.
//   anemo_period_us: mean pulse period this bin (us). >= 1_900_000 means stalled.
//   dir_mv:          calibrated wind-vane ADC reading (esp_adc_cal at 0 dB, 0..1100).
// Conversion to m/s and degrees lives in uploadToInflux per per-unit calibration.
// See firmware/ESP32DavisWind/docs/UPLOAD_PATTERN.md.
message WindSeries {
    int64 time = 1; // microseconds since epoch, end of window
    repeated uint32 anemo_period_us = 2 [packed=true, (nanopb).max_count = 10, (nanopb).int_size = IS_32];
    repeated uint32 dir_mv          = 3 [packed=true, (nanopb).max_count = 10, (nanopb).int_size = IS_16];
}

// Emitted by ESP32Utils TimeWatchdog whenever it hard-steps the system clock.
// Lets the fleet's time-keeping behavior be monitored over time.
message TimeWatchdogEvent {
    int64  time           = 1; // microseconds since epoch, post-step (corrected wall time)
    float  offset_seconds = 2; // signed offset that was just applied (positive = clock was behind, negative = was ahead)
    uint32 trip_count     = 3; // consecutive samples above threshold that triggered the step
    string ntp_server     = 4 [(nanopb).max_size = 64]; // NTP source the watchdog queried
}
